// 計算「記錄類」資料總筆數(重訓+身體數據+其他運動+按摩修復)
// 用於備份/還原前的防呆檢查：避免空白(或筆數較少)的資料覆蓋既有記錄
// d 預設為目前的 S(本機狀態)，也可傳入解析後的備份檔物件(d)來計算「即將還原的資料」筆數
function getBackupRecordCount(d){
  d=d||S;
  return(d.sessions?d.sessions.length:0)+(d.bodyData?d.bodyData.length:0)+(d.otherLogs?d.otherLogs.length:0)+(d.massageLogs?d.massageLogs.length:0);
}

function el(tag,attrs){
  var e=document.createElement(tag);
  if(attrs){
    Object.keys(attrs).forEach(function(k){
      var v=attrs[k];
      if(k==="cls"){e.className=v;}
      else if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
      else if(k.slice(0,2)==="on"&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v);}
      else{e.setAttribute(k,v);}
    });
  }
  for(var i=2;i<arguments.length;i++){
    var c=arguments[i];
    if(c==null||c===false)continue;
    if(Array.isArray(c)){c.forEach(function(x){if(x!=null)e.appendChild(typeof x==="string"?document.createTextNode(x):x);});}
    else{e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);}
  }
  return e;
}

function notify(msg){
  var n=document.getElementById("notif");
  n.textContent=msg;n.classList.add("show");
  setTimeout(function(){n.classList.remove("show");},2500);
}

function makeCSV(rows){
  return rows.map(function(r){
    return r.map(function(v){
      var s=String(v==null?"":v).replace(/"/g,'""');
      return'"'+s+'"';
    }).join(",");
  }).join("\r\n");
}

function dlFile(content,filename,type){
  var blob=new Blob(["\uFEFF"+content],{type:type});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

function requestNotifPermission(cb){
  if(!("Notification" in window)){cb(false);return;}
  if(Notification.permission==="granted"){cb(true);return;}
  if(Notification.permission==="denied"){cb(false);return;}
  Notification.requestPermission().then(function(p){cb(p==="granted");});
}

function initGoogleDrive(){
  if(_gdInited||!GD_CLIENT_ID)return;
  gapi.load("client",function(){
    gapi.client.init({apiKey:GD_API_KEY,discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]}).then(function(){
      _gdInited=true;
    });
  });
  _gdTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GD_CLIENT_ID,
    scope:GD_SCOPE,
    callback:""
  });
}

function gdSignIn(cb){
  if(!GD_CLIENT_ID){
    alert("請先設定 Google API 憑證（Client ID）。請參考說明文件設定。");
    return;
  }
  _gdTokenClient.callback=function(resp){
    if(resp.error){notify("❌ Google 登入失敗");return;}
    fetchGDriveAccountEmail();
    cb();
  };
  if(!gapi.client.getToken()){
    _gdTokenClient.requestAccessToken({prompt:"consent"});
  } else {
    _gdTokenClient.requestAccessToken({prompt:""});
  }
}

// 取得目前登入的 Google 帳號 email，顯示在匯出頁讓使用者確認帳號正確
// 失敗時靜默忽略，不影響備份/還原等主要功能
function fetchGDriveAccountEmail(){
  var token=gapi.client.getToken();
  if(!token||!token.access_token)return;
  fetch("https://www.googleapis.com/oauth2/v3/userinfo",{
    headers:{"Authorization":"Bearer "+token.access_token}
  }).then(function(r){return r.ok?r.json():null;})
    .then(function(info){
      if(info&&info.email&&info.email!==S._gdEmail){
        S._gdEmail=info.email;
        lsSet("gd_account_email",info.email);
        render();
      }
    }).catch(function(){});
}

// 強制跳出 Google 帳號選擇器，讓使用者主動切換/確認備份用的帳號
function switchGDriveAccount(){
  if(!GD_CLIENT_ID){
    alert("請先設定 Google API 憑證（Client ID）。請參考說明文件設定。");
    return;
  }
  _gdTokenClient.callback=function(resp){
    if(resp.error){notify("❌ Google 登入失敗");return;}
    fetchGDriveAccountEmail();
    notify("✅ 已切換 Google 帳號");
  };
  _gdTokenClient.requestAccessToken({prompt:"select_account"});
}

// 產生帶時間戳記的備份檔名，例如 Nicole運動日誌備份_2026-06-22_15-30-45.json
// 每次同步都用不同檔名 → uploadToGDrive會走「新建」分支，保留歷史版本而非覆蓋舊版
function gdBackupFilename(){
  var d=new Date();
  function p2(n){return(n<10?"0":"")+n;}
  return"Nicole運動日誌備份_"+d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate())+"_"+p2(d.getHours())+"-"+p2(d.getMinutes())+"-"+p2(d.getSeconds())+".json";

function pruneOldGDriveBackups(maxKeep){
  maxKeep=maxKeep||6;
  gdSignIn(function(){
    gapi.client.drive.files.list({
      q:"name contains '運動日誌備份' and trashed=false",
      fields:"files(id,modifiedTime)",
      orderBy:"modifiedTime desc",
      pageSize:50
    }).then(function(r){
      var files=r.result.files||[];
      if(files.length<=maxKeep)return;
      files.slice(maxKeep).forEach(function(f){
        gapi.client.drive.files.delete({fileId:f.id}).catch(function(){});
      });
    }).catch(function(){});
  });
}

function downloadFromGDrive(fileId, cb){
  gdSignIn(function(){
    var token=gapi.client.getToken();
    if(!token||!token.access_token){notify("❌ 請先登入 Google 帳號");return;}
    // 用 fetch 直接下載，比 gapi.client 更可靠
    fetch("https://www.googleapis.com/drive/v3/files/"+fileId+"?alt=media",{
      headers:{"Authorization":"Bearer "+token.access_token}
    }).then(function(r){
      if(!r.ok){notify("❌ 下載失敗：HTTP "+r.status);return;}
      return r.text();
    }).then(function(text){
      if(text)cb(text);
      else notify("❌ 備份檔案內容為空");
    }).catch(function(e){notify("❌ 下載失敗："+e.message);});
  });

// ── 配速自動計算 ──
function autoCalcPace(setObj, paceEl){
  if(!setObj)return;
  var dur=parseFloat(setObj.duration);
  var dist=parseFloat(setObj.distance);
  if(!dur||!dist||dist===0)return;
  var paceMin=dur/dist;
  var min=Math.floor(paceMin);
  var sec=Math.round((paceMin-min)*60);
  if(sec===60){min++;sec=0;}
  var paceStr=min+":"+(sec<10?"0":"")+sec;
  setObj.pace=paceStr;
  if(paceEl&&paceEl.tagName==="INPUT"){
    paceEl.value=paceStr;
    paceEl.style.color="#059669";
    paceEl.title="自動計算（時間÷距離）";
  }
}

var _timerInterval=null;
var _timerSec=0;       // 目前倒數剩餘秒數
var _timerRunning=false;
var _timerPreset=60;   // 預設秒數
var _audioCtx=null;    // 共用 AudioContext（避免重複建立）

function getAudioCtx(){
  if(!_audioCtx){
    try{ _audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  // 若被暫停則恢復
  if(_audioCtx&&_audioCtx.state==="suspended") _audioCtx.resume();
  return _audioCtx;
}

function playBell(){
  // 輕柔一聲「叮」
  try{
    var ctx=getAudioCtx(); if(!ctx)return;
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type="sine";
    osc.frequency.setValueAtTime(1047,ctx.currentTime);   // Do5
    gain.gain.setValueAtTime(0.0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.25,ctx.currentTime+0.01); // 快速淡入
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.2); // 慢慢淡出
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+1.2);
  }catch(e){ console.log("Bell error:",e); }
}

function timerTick(){
  if(!_timerRunning) return;
  if(_timerSec>0){
    _timerSec--;
    updateTimerDisplay();
    if(_timerSec===0){
      // 震動：兩下
      // 多種方式嘗試震動
      try{
        if(window.navigator&&window.navigator.vibrate){
          window.navigator.vibrate([500,100,500,100,500]);
        } else if(navigator.vibrate){
          navigator.vibrate([500,100,500,100,500]);
        }
      }catch(ev){}
      // 鈴聲
      playBell();
      notify("⏰ 休息時間到！");
      // 重設並繼續倒數（不停止，直接重新開始）
      setTimeout(function(){
        _timerSec=_timerPreset;
        updateTimerDisplay();
      },1200); // 讓鈴聲響完再重設顯示
    }
  }
}
function updateTimerDisplay(){
  var el2=document.getElementById("timer-disp");
  if(!el2)return;
  var m=Math.floor(_timerSec/60),s=_timerSec%60;
  el2.textContent=("0"+m).slice(-2)+":"+("0"+s).slice(-2);
  el2.style.color=_timerSec<=10&&_timerSec>0?"#dc2626":_timerSec===0?"#9ca3af":"#111827";
}
function startTimer(){
  if(_timerRunning)return;
  if(_timerSec===0)_timerSec=_timerPreset;
  // 初始化並解鎖 AudioContext
  getAudioCtx();
  // 按下開始時輕震一下，確認震動功能正常
  try{ window.navigator.vibrate&&window.navigator.vibrate(100); }catch(e){}
  _timerRunning=true;
  _timerInterval=setInterval(timerTick,1000);
  updateTimerBtns();
}
function pauseTimer(){
  if(!_timerRunning)return;
  clearInterval(_timerInterval);_timerInterval=null;_timerRunning=false;
  updateTimerBtns();
}
function resetTimer(){
  clearInterval(_timerInterval);_timerInterval=null;_timerRunning=false;
  _timerSec=_timerPreset;
  updateTimerDisplay();updateTimerBtns();
}
function updateTimerBtns(){
  var sb=document.getElementById("timer-start");
  var pb=document.getElementById("timer-pause");
  if(sb)sb.style.display=_timerRunning?"none":"block";
  if(pb)pb.style.display=_timerRunning?"block":"none";
}

// 同步 oSel 到 otherLogs（即時更新次數，備註等按儲存才寫入）
function saveOtherLog(date, activities, note){
  // 唯一的 otherLogs 寫入函數，先刪同日再寫入，保證每天只有一筆
  S.otherLogs=S.otherLogs.filter(function(l){return l.date!==date;});
  if(activities&&activities.length>0){
    // 確保 activities 格式正確
    var cleanActs=activities.map(function(a){
      if(typeof a==="string")return{id:a,count:1};
      return{id:a.id,count:parseInt(a.count,10)||1};
    });
    S.otherLogs.push({date:date,activities:cleanActs,note:note||""});
    S.otherLogs.sort(function(a,b){return a.date.localeCompare(b.date);});
  }
  lsSet("other_logs",S.otherLogs);
  // 確認寫入成功
  var verify=S.otherLogs.filter(function(l){return l.date===date;})[0];
  if(activities&&activities.length>0&&!verify){
    console.error("saveOtherLog: write failed for "+date);
  }
}

function renderGoals(){
  var now=new Date();
  var curMonth=now.getFullYear()+"-"+(now.getMonth()<9?"0":"")+(now.getMonth()+1);
  var g=S.goals;
  var card=el("div",{cls:"card"});
  // 標題列
  var hRow=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}});
  hRow.appendChild(el("div",{style:{fontWeight:700,fontSize:"14px"}},"🎯 訓練目標"));
  hRow.appendChild(el("button",{style:{fontSize:"12px",color:"#2563eb",background:"none",border:"1px solid #bfdbfe",borderRadius:"8px",padding:"4px 10px",cursor:"pointer"},onclick:function(){S.showGoalSetup=!S.showGoalSetup;render();}},S.showGoalSetup?"完成":"⚙️ 設定目標"));
  card.appendChild(hRow);

  // 目標設定面板
  if(S.showGoalSetup){
    var setupBox=el("div",{style:{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:"10px",padding:"12px",marginBottom:"12px"}});
    // 每月重訓目標
    setupBox.appendChild(el("div",{cls:"lbl",style:{marginBottom:"4px"}},"每月重訓目標（次）"));
    var wtGoalInp=el("input",{type:"number",cls:"inp",style:{marginBottom:"10px"},placeholder:"0=不設定",value:g.monthlyWorkout||""});
    wtGoalInp.addEventListener("change",function(e){g.monthlyWorkout=+e.target.value||0;persist();render();});
    setupBox.appendChild(wtGoalInp);
    // 各運動目標
    setupBox.appendChild(el("div",{cls:"lbl",style:{marginBottom:"6px"}},"每月各運動目標（次）"));
    var allActsGoal=getOtherActs().concat(S.customActs);
    allActsGoal.forEach(function(a){
      var row=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}});
      row.appendChild(el("span",{style:{fontSize:"13px",flex:1}},a.emoji+" "+a.label));
      var inp=el("input",{type:"number",cls:"inp",style:{width:"70px",textAlign:"center"},placeholder:"0",value:(g.monthlyOther&&g.monthlyOther[a.id])||""});
      inp.addEventListener("change",(function(id){return function(e){if(!g.monthlyOther)g.monthlyOther={};g.monthlyOther[id]=+e.target.value||0;persist();};})(a.id));
      row.appendChild(inp);
      row.appendChild(el("span",{style:{fontSize:"12px",color:"#6b7280"}},"次"));
      setupBox.appendChild(row);
    });
    card.appendChild(setupBox);
  }

  // 進度顯示
  var wtDone=S.sessions.filter(function(s){return s.date.indexOf(curMonth)===0;}).length;
  var wtGoal=g.monthlyWorkout||0;
  if(wtGoal>0){
    var wtPct=Math.min(100,Math.round(wtDone/wtGoal*100));
    var wtBar=el("div",{style:{marginBottom:"12px"}});
    var wtLbl=el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"4px"}});
    wtLbl.appendChild(el("span",{style:{fontWeight:600}},"💪 重訓"));
    wtLbl.appendChild(el("span",{style:{color:wtDone>=wtGoal?"#059669":"#6b7280"}},wtDone+"/"+wtGoal+"次 "+(wtDone>=wtGoal?"✅ 達標！":"("+wtPct+"%)") ));
    wtBar.appendChild(wtLbl);
    var track=el("div",{style:{background:"#e5e7eb",borderRadius:"99px",height:"10px",overflow:"hidden"}});
    track.appendChild(el("div",{style:{width:wtPct+"%",background:wtDone>=wtGoal?"#059669":"#2563eb",height:"100%",borderRadius:"99px",transition:"width .3s"}}));
    wtBar.appendChild(track);
    card.appendChild(wtBar);
  }

  // 各運動進度
  var allActsGoal2=getOtherActs().concat(S.customActs);
  allActsGoal2.forEach(function(a){
    var goal=(g.monthlyOther&&g.monthlyOther[a.id])||0;
    if(!goal)return;
    var done=S.otherLogs.filter(function(l){
      return l.date.indexOf(curMonth)===0&&l.activities.some(function(x){return(typeof x==="object"?x.id:x)===a.id;});
    }).reduce(function(sum,l){
      var item=l.activities.find(function(x){return(typeof x==="object"?x.id:x)===a.id;});
      return sum+(item&&typeof item==="object"?item.count||1:1);
    },0);
    var pct=Math.min(100,Math.round(done/goal*100));
    var bar=el("div",{style:{marginBottom:"10px"}});
    var lbl=el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"4px"}});
    lbl.appendChild(el("span",{style:{fontWeight:600}},a.emoji+" "+a.label));
    lbl.appendChild(el("span",{style:{color:done>=goal?"#059669":"#6b7280"}},done+"/"+goal+"次 "+(done>=goal?"✅ 達標！":"("+pct+"%)") ));
    bar.appendChild(lbl);
    var track2=el("div",{style:{background:"#e5e7eb",borderRadius:"99px",height:"10px",overflow:"hidden"}});
    track2.appendChild(el("div",{style:{width:pct+"%",background:done>=goal?"#059669":a.color||"#2563eb",height:"100%",borderRadius:"99px",transition:"width .3s"}}));
    bar.appendChild(track2);
    card.appendChild(bar);
  });

  if(!wtGoal&&!(g.monthlyOther&&Object.keys(g.monthlyOther).some(function(k){return g.monthlyOther[k]>0;}))){
    card.appendChild(el("div",{style:{fontSize:"12px",color:"#9ca3af",textAlign:"center",padding:"8px 0"}},"點「⚙️ 設定目標」設定每月運動目標"));
  }
  return card;
}

function renderOtherStats(allActs){
  var OTHER_ACTS=getOtherActs();
  var card=el("div",{cls:"card"});
  var hRow=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}});
  hRow.appendChild(el("div",{style:{fontWeight:700,fontSize:"14px"}},"📊 月統計"));
  var mi=el("input",{type:"month",cls:"inp",style:{width:"auto",fontSize:"12px",padding:"4px 8px"},value:S.oStatsMonth,onchange:function(e){S.oStatsMonth=e.target.value;render();}});
  hRow.appendChild(mi);card.appendChild(hRow);

  // 重訓統計
  var wtCnt=S.sessions.filter(function(s){return s.date.indexOf(S.oStatsMonth)===0;}).length;
  var wtSelf=S.sessions.filter(function(s){return s.date.indexOf(S.oStatsMonth)===0&&(s.type==="self"||!s.type);}).length;
  var wtGroup=S.sessions.filter(function(s){return s.date.indexOf(S.oStatsMonth)===0&&s.type==="group";}).length;
  var wtCoach=S.sessions.filter(function(s){return s.date.indexOf(S.oStatsMonth)===0&&s.type==="coach";}).length;

  var wtItems=[
    {label:"重訓（全部）",color:"#2563eb",cnt:wtCnt},
    {label:"🏋️ 自主訓練",color:"#3b82f6",cnt:wtSelf},
    {label:"👥 團體課",  color:"#059669",cnt:wtGroup},
    {label:"🎓 教練課",  color:"#7c3aed",cnt:wtCoach},
  ];

  // 計算各運動當月總次數（掃描所有出現的 ID，不只限清單裡的）
  var actTotals={};
  S.otherLogs.forEach(function(l){
    if(l.date.indexOf(S.oStatsMonth)!==0)return;
    (l.activities||[]).forEach(function(x){
      var xid=typeof x==="object"?x.id:x;
      var xc=typeof x==="object"?x.count:1;
      var n=parseInt(xc,10);
      if(!actTotals[xid])actTotals[xid]=0;
      actTotals[xid]+=(!isNaN(n)&&n>0)?n:1;
    });
  });
  // 用 allActs 清單取得名稱，找不到的用 getActInfo
  var allItems=wtItems.concat(Object.keys(actTotals).map(function(id){
    var a=allActs.filter(function(x){return x.id===id;})[0]||getActInfo(id);
    return{label:a.emoji+" "+a.label,color:a.color||"#6b7280",cnt:actTotals[id]};
  }));
  // 加入按摩修復工具統計
  var massageItems=getMassage().map(function(m){return{
    label:m.emoji+" "+m.label,
    color:"#0891b2",
    cnt:S.massageLogs.filter(function(l){
      return l.date.indexOf(S.oStatsMonth)===0&&l.tools.indexOf(m.id)>=0;
    }).length
  };}).filter(function(x){return x.cnt>0;});

  var maxC=Math.max.apply(null,allItems.concat(massageItems).map(function(x){return x.cnt;}).concat([1]));

  // 分隔標題
  card.appendChild(el("div",{style:{fontSize:"12px",fontWeight:700,color:"#2563eb",marginBottom:"8px",paddingBottom:"6px",borderBottom:"1px solid #e5e7eb"}},"💪 重訓"));
  wtItems.forEach(function(item){
    var row=el("div",{style:{marginBottom:"8px"}});
    var top=el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"3px"}});
    top.appendChild(el("span",{},item.label));
    top.appendChild(el("span",{style:{fontWeight:700,color:item.color}},item.cnt+" 次"));
    row.appendChild(top);
    var bg=el("div",{style:{background:"#f3f4f6",borderRadius:"99px",height:"8px"}});
    bg.appendChild(el("div",{style:{background:item.color,width:(item.cnt/maxC*100)+"%",height:"8px",borderRadius:"99px",transition:"width .4s"}}));
    row.appendChild(bg);card.appendChild(row);
  });

  card.appendChild(el("div",{style:{fontSize:"12px",fontWeight:700,color:"#374151",marginTop:"12px",marginBottom:"8px",paddingBottom:"6px",borderBottom:"1px solid #e5e7eb"}},"🏃 其他運動"));
  // 顯示其他運動統計（用 actTotals 確保次數正確）
  Object.keys(actTotals).forEach(function(id){
    var a=allActs.filter(function(x){return x.id===id;})[0]||getActInfo(id);
    var cnt=actTotals[id];
    var row=el("div",{style:{marginBottom:"8px"}});
    var top=el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"3px"}});
    top.appendChild(el("span",{},a.emoji+" "+a.label));
    top.appendChild(el("span",{style:{fontWeight:700,color:a.color||"#6b7280"}},cnt+" 次"));
    row.appendChild(top);
    var bg=el("div",{style:{background:"#f3f4f6",borderRadius:"99px",height:"8px"}});
    bg.appendChild(el("div",{style:{background:a.color||"#6b7280",width:(cnt/maxC*100)+"%",height:"8px",borderRadius:"99px",transition:"width .4s"}}));
    row.appendChild(bg);card.appendChild(row);
  });
  // 顯示 allActs 裡有但本月沒有記錄的（顯示0次）
  allActs.forEach(function(a){
    if(actTotals[a.id])return; // 已顯示
    var row=el("div",{style:{marginBottom:"8px"}});
    var top=el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"3px"}});
    top.appendChild(el("span",{},a.emoji+" "+a.label));
    top.appendChild(el("span",{style:{fontWeight:700,color:a.color}},"0 次"));
    row.appendChild(top);
    var bg=el("div",{style:{background:"#f3f4f6",borderRadius:"99px",height:"8px"}});
    bg.appendChild(el("div",{style:{background:a.color,width:"0%",height:"8px",borderRadius:"99px"}}));
    row.appendChild(bg);card.appendChild(row);
  });

  // ── 按摩修復工具統計 ──
  if(massageItems.length>0){
    card.appendChild(el("div",{style:{fontSize:"13px",fontWeight:700,color:"#0891b2",
      marginTop:"14px",marginBottom:"8px",paddingTop:"10px",borderTop:"1px solid #f3f4f6"}},"🛁 按摩修復"));
    massageItems.forEach(function(item){
      var row2=el("div",{style:{marginBottom:"8px"}});
      var top2=el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"3px"}});
      top2.appendChild(el("span",{},item.label));
      top2.appendChild(el("span",{style:{fontWeight:700,color:item.color}},item.cnt+" 次"));
      row2.appendChild(top2);
      var bg2=el("div",{style:{background:"#f3f4f6",borderRadius:"99px",height:"8px"}});
      bg2.appendChild(el("div",{style:{background:item.color,width:(item.cnt/maxC*100)+"%",height:"8px",borderRadius:"99px",transition:"width .4s"}}));
      row2.appendChild(bg2);card.appendChild(row2);
    });
  }

  return card;
}

function addExercise(){

function saveSession(){
  var ok=S.rows.some(function(r){return r.exercise&&r.sets.some(function(s){return s.reps||s.weight||s.duration;});});
  if(!ok){notify("請至少填寫一個動作！");return;}
  var entry={id:S.editSid||Date.now(),date:S.sDate,start:S.sStart,end:S.sEnd,type:S.sType,note:S.sNote,rows:deepClone(S.rows)};
  if(S.editSid){S.sessions=S.sessions.map(function(x){return x.id===S.editSid?entry:x;});}
  else{S.sessions.push(entry);}
  var wasEdit=!!S.editSid;
  S.rows=[newRow()];S.sStart="";S.sEnd="";S.sNote="";S.prevMap={};S.editSid=null;persist();
  notify(wasEdit?"✅ 訓練記錄已更新！":"✅ 訓練記錄已儲存！");render();
}

function renderChart(){

  var fdow=new Date(yr,mo-1,1).getDay();
  var dim=new Date(yr,mo,0).getDate();
  var todayS=today();
  var dm={};
  S.sessions.forEach(function(s){
    if(s.date.indexOf(S.calMonth)!==0)return;
    var d=+s.date.slice(8,10);
    if(!dm[d])dm[d]=[];
    if(dm[d].indexOf("workout")<0)dm[d].push("workout");
  });
  S.otherLogs.forEach(function(l){
    if(l.date.indexOf(S.calMonth)!==0)return;
    var d=+l.date.slice(8,10);

    l.activities.forEach(function(item){var id=typeof item==="object"?item.id:item;if(dm[d].indexOf(id)<0)dm[d].push(id);});
  });
  var pad=fdow===0?6:fdow-1;

    var y=+S.calMonth.slice(0,4),m=+S.calMonth.slice(5,7);
    m--; if(m<1){m=12;y--;} 
    S.calMonth=y+"-"+("0"+m).slice(-2); render();
  }},"‹"));
  nav.appendChild(el("span",{style:{fontWeight:700,fontSize:"15px"}},yr+" 年 "+mo+" 月"));
  nav.appendChild(el("button",{style:{background:"none",border:"none",fontSize:"24px",color:"#6b7280",padding:"0 10px"},onclick:function(){
    var y=+S.calMonth.slice(0,4),m=+S.calMonth.slice(5,7);
    m++; if(m>12){m=1;y++;}

  }},"›"));

  ["一","二","三","四","五","六","日"].forEach(function(d){calHdr.appendChild(el("div",{style:{textAlign:"center",fontSize:"10px",color:"#9ca3af",fontWeight:600}},d));});

function makeBarChart(){
  // 近12週每週重訓+其他運動次數
  var weeks=[];
  var now=new Date();
  for(var w=11;w>=0;w--){
    var wStart=new Date(now);
    wStart.setDate(now.getDate()-now.getDay()+1-(w*7)); // 週一
    var wEnd=new Date(wStart);wEnd.setDate(wStart.getDate()+6);
    var ws=wStart.toISOString().slice(0,10);
    var we=wEnd.toISOString().slice(0,10);
    var label=(wStart.getMonth()+1)+"/"+(wStart.getDate());
    var wtCnt=S.sessions.filter(function(s){return s.date>=ws&&s.date<=we;}).length;
    var otCnt=S.otherLogs.filter(function(l){return l.date>=ws&&l.date<=we;}).length;
    weeks.push({label:label,wt:wtCnt,ot:otCnt,total:wtCnt+otCnt});
  }
  var maxVal=Math.max.apply(null,weeks.map(function(w){return w.total;}),1);
  var W=340,H=160,padL=24,padB=30,padT=10;
  var barW=Math.floor((W-padL)/12)-3;
  var NS="http://www.w3.org/2000/svg";
  function se(tag,attrs,text){var e=document.createElementNS(NS,tag);if(attrs)Object.keys(attrs).forEach(function(k){e.setAttribute(k,attrs[k]);});if(text!=null)e.textContent=text;return e;}
  var svg=se("svg",{viewBox:"0 0 "+W+" "+H,style:"width:100%;max-width:"+W+"px"});
  // 橫線
  [0,0.25,0.5,0.75,1].forEach(function(r){
    var y=padT+(H-padT-padB)*(1-r);
    svg.appendChild(se("line",{x1:padL,y1:y,x2:W,y2:y,stroke:"#f3f4f6","stroke-width":"1"}));
    if(r>0)svg.appendChild(se("text",{x:padL-2,y:y+4,"font-size":"9",fill:"#9ca3af","text-anchor":"end"},Math.round(maxVal*r)));
  });
  weeks.forEach(function(wk,i){
    var x=padL+i*((W-padL)/12)+2;
    var availH=H-padT-padB;
    // 重訓（藍）
    var wtH=maxVal>0?Math.round((wk.wt/maxVal)*availH):0;
    if(wtH>0)svg.appendChild(se("rect",{x:x,y:padT+availH-wtH,width:barW,height:wtH,fill:"#2563eb",rx:"3"}));
    // 其他運動（綠）疊加
    var otH=maxVal>0?Math.round((wk.ot/maxVal)*availH):0;
    if(otH>0)svg.appendChild(se("rect",{x:x,y:padT+availH-wtH-otH,width:barW,height:otH,fill:"#10b981",rx:"3"}));
    // 數字
    if(wk.total>0)svg.appendChild(se("text",{x:x+barW/2,y:padT+availH-wtH-otH-2,"font-size":"9",fill:"#374151","text-anchor":"middle"},wk.total));
    // 日期標籤
    svg.appendChild(se("text",{x:x+barW/2,y:H-2,"font-size":"9",fill:"#9ca3af","text-anchor":"middle"},wk.label));
  });
  // 圖例
  var wrap=document.createElement("div");
  wrap.appendChild(svg);
  var legend=document.createElement("div");
  legend.style.display="flex";legend.style.gap="12px";legend.style.marginTop="6px";
  [["#2563eb","重訓"],["#10b981","其他運動"]].forEach(function(x){
    var li=document.createElement("div");li.style.display="flex";li.style.alignItems="center";li.style.gap="4px";li.style.fontSize="11px";
    var dot=document.createElement("span");dot.style.width="10px";dot.style.height="10px";dot.style.borderRadius="2px";dot.style.background=x[0];dot.style.display="inline-block";
    li.appendChild(dot);li.appendChild(document.createTextNode(x[1]));legend.appendChild(li);
  });
  wrap.appendChild(legend);
  return wrap;
}

function makeSVGChart(data,color,label,targetVal){
  if(!data||data.length<2)return el("div",{style:{textAlign:"center",color:"#9ca3af",padding:"32px 0",fontSize:"13px"}},"資料不足，需至少兩筆記錄");
  // 數值格式化：整數不顯示小數點，非整數統一顯示到小數第1位
  function fmtNum(n){var r=Math.round(n*10)/10;return (Math.abs(r-Math.round(r))<0.001)?String(Math.round(r)):r.toFixed(1);}
  var W=360,H=210,padL=44,padR=14,padT=22,padB=32;
  var availW=W-padL-padR,availH=H-padT-padB;
  var vals=data.map(function(d){return d.value;});
  var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),range=max-min||1;
  var pts=data.map(function(d,i){return{x:padL+(i/(data.length-1))*availW,y:padT+((max-d.value)/range)*availH,date:d.date,value:d.value};});
  var path=pts.map(function(p,i){return(i===0?"M":"L")+p.x+","+p.y;}).join(" ");
  var area=path+" L"+pts[pts.length-1].x+","+(H-padB)+" L"+pts[0].x+","+(H-padB)+" Z";
  var NS="http://www.w3.org/2000/svg";
  function s(tag,attrs,text){var e=document.createElementNS(NS,tag);if(attrs)Object.keys(attrs).forEach(function(k){e.setAttribute(k,attrs[k]);});if(text!=null)e.textContent=text;return e;}
  var svg=s("svg",{viewBox:"0 0 "+W+" "+H,style:"width:100%;max-width:"+W+"px"});
  var defs=s("defs");
  var gid="g"+color.replace("#","");
  var grad=s("linearGradient",{id:gid,x1:"0",y1:"0",x2:"0",y2:"1"});
  grad.appendChild(s("stop",{"offset":"0%","stop-color":color,"stop-opacity":"0.18"}));
  grad.appendChild(s("stop",{"offset":"100%","stop-color":color,"stop-opacity":"0"}));
  defs.appendChild(grad);svg.appendChild(defs);
  // 格線 + Y軸多段刻度（0%/25%/50%/75%/100%），頭尾刻度額外標單位
  [0,0.25,0.5,0.75,1].forEach(function(r){
    var gy=padT+r*availH;
    var gv=max-r*range;
    svg.appendChild(s("line",{x1:padL,y1:gy,x2:W-padR,y2:gy,stroke:"#f1f5f9","stroke-width":"1"}));
    svg.appendChild(s("text",{x:padL-6,y:gy+3,"font-size":"9",fill:"#9ca3af","text-anchor":"end"},fmtNum(gv)+((r===0||r===1)?label:"")));
  });
  svg.appendChild(s("path",{d:area,fill:"url(#"+gid+")"}));
  svg.appendChild(s("path",{d:path,fill:"none",stroke:color,"stroke-width":"2.2","stroke-linejoin":"round","stroke-linecap":"round"}));
  // 資料點：預設不顯示數值，點一下顯示該點數值，再點一下收合（觸控/滑鼠點擊皆可，用透明大圓擴大可點擊範圍）
  pts.forEach(function(p){
    var valTxt=null;
    var hit=s("circle",{cx:p.x,cy:p.y,r:"11",fill:"transparent",style:"cursor:pointer"});
    hit.addEventListener("click",function(){
      if(valTxt){svg.removeChild(valTxt);valTxt=null;return;}
      var ly=(p.y-padT<14)?p.y+16:p.y-10;
      valTxt=s("text",{x:p.x,y:ly,"font-size":"11",fill:"#111827","font-weight":"700","text-anchor":"middle",stroke:"white","stroke-width":"3","paint-order":"stroke"},fmtNum(p.value));
      svg.appendChild(valTxt);
    });
    svg.appendChild(hit);
    svg.appendChild(s("circle",{cx:p.x,cy:p.y,r:"4",fill:"white",stroke:color,"stroke-width":"2"}));
  });
  svg.appendChild(s("text",{x:padL,y:H-10,"font-size":"10",fill:"#9ca3af"},data[0].date));
  svg.appendChild(s("text",{x:W-padR,y:H-10,"font-size":"10",fill:"#9ca3af","text-anchor":"end"},data[data.length-1].date));
  // 目標線
  if(targetVal!=null&&targetVal>=min&&targetVal<=max){
    var ty=padT+((max-targetVal)/range)*availH;
    svg.appendChild(s("line",{x1:padL,y1:ty,x2:W-padR,y2:ty,stroke:"#ef4444","stroke-width":"1.5","stroke-dasharray":"4,3"}));
    svg.appendChild(s("text",{x:W-padR,y:ty-4,"font-size":"10",fill:"#ef4444","text-anchor":"end"},"目標 "+targetVal+label));
  }
  return svg;
}

// ── 自動同步功能 ──
function autoSyncBackup(){
  // 檢查距離上次同步是否超過 2 天
  var now=new Date();
  var lastSync=S._lastSyncTime?new Date(S._lastSyncTime):null;
  var daysDiff=lastSync?Math.floor((now-lastSync)/(1000*60*60*24)):999;
  if(daysDiff<2)return; // 未超過 2 天，不需要同步
  // 超過 2 天，自動同步
  if(!GD_CLIENT_ID)return; // 沒有設定 API 憑證
  // 確認 gapi 已載入
  if(typeof gapi==="undefined"||typeof google==="undefined")return;
  var data={version:1,exportedAt:now.toISOString(),sessions:S.sessions,bodyData:S.bodyData,otherLogs:S.otherLogs,massageLogs:S.massageLogs,reminders:S.reminders,customActs:S.customActs,groups:S.groups,templates:S.templates,actNameCache:S.actNameCache,pinnedExercises:S.pinnedExercises,goals:S.goals,bodyTargetWeight:S.bodyTargetWeight};
  // 確認有資料才自動同步(含重訓/身體數據/其他運動/按摩修復)
  var autoTotal=getBackupRecordCount(data);
  if(autoTotal===0)return;
  // 防呆：自動同步是靜默執行的，若發現目前筆數比上次同步時還少(可能誤刪記錄)，
  // 不直接覆蓋雲端備份，而是暫停這次自動同步，改用提醒請使用者到「匯出」頁手動確認後再同步
  if(S._lastSyncCount!=null&&autoTotal<S._lastSyncCount){
    notify("⚠️ 偵測到記錄筆數比上次同步時少("+autoTotal+"筆 < "+S._lastSyncCount+"筆)，已暫停自動同步，請至「匯出」頁確認後手動同步");
    return;
  }
  uploadToGDrive(JSON.stringify(data,null,2),gdBackupFilename(),"application/json",function(){
    S._lastSyncTime=now.toISOString();
    S._lastSyncCount=autoTotal;
    lsSet("last_sync_time",S._lastSyncTime);
    lsSet("last_sync_count",S._lastSyncCount);
    pruneOldGDriveBackups(6);
    notify("✅ 已自動同步備份至 Google 雲端");
    render(); // 更新顯示的同步時間
  });
}

// ── Excel / CSV 匯出函數 ──
function uploadExcelToGDrive(blob, filename){
  gdSignIn(function(){
    var token=gapi.client.getToken();
    if(!token||!token.access_token){notify("❌ 請先登入 Google 帳號");return;}
    var accessToken=token.access_token;
    // 先查詢是否已有同名檔案
    fetch("https://www.googleapis.com/drive/v3/files?q=name%3D'"+encodeURIComponent(filename)+"'+and+trashed%3Dfalse&fields=files(id)&pageSize=1",{
      headers:{"Authorization":"Bearer "+accessToken}
    }).then(function(r){return r.json();}).then(function(data){
      var files=data.files||[];
      var url,method;
      if(files.length>0){
        // 覆蓋舊檔
        url="https://www.googleapis.com/upload/drive/v3/files/"+files[0].id+"?uploadType=multipart";
        method="PATCH";
      } else {
        // 新建
        url="https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        method="POST";
      }
      var meta=JSON.stringify({name:filename,mimeType:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
      var boundary="nicole_xlsx_boundary_"+Date.now();
      var delimiter="\r\n--"+boundary+"\r\n";
      var closeDelim="\r\n--"+boundary+"--";
      // 用 FormData 方式組合 multipart
      var metaBlob=new Blob([delimiter+"Content-Type: application/json\r\n\r\n"+meta+delimiter+"Content-Type: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet\r\n\r\n"],{type:"text/plain"});
      var closeBlob=new Blob([closeDelim],{type:"text/plain"});
      var body=new Blob([metaBlob,blob,closeBlob]);
      fetch(url,{
        method:method,
        headers:{
          "Authorization":"Bearer "+accessToken,
          "Content-Type":"multipart/related; boundary="+boundary
        },
        body:body
      }).then(function(r){
        if(r.ok){
          notify("✅ Google 雲端 Excel 已"+(files.length>0?"更新":"建立")+"！");
          S._lastExcelSyncTime=new Date().toISOString();
          lsSet("last_excel_sync_time",S._lastExcelSyncTime);
          render();
        }
        else{r.json().then(function(e){notify("❌ 上傳失敗："+e.error.message);});}
      }).catch(function(e){notify("❌ 網路錯誤："+e.message);});
    }).catch(function(e){notify("❌ 查詢失敗："+e.message);});
  });
}

function uploadToGDriveB64(b64,filename,mimeType){
  gdSignIn(function(){
    var CRLF="\r\n";
    var boundary="-------nicole314159265";
    gapi.client.drive.files.list({
      q:"name='"+filename+"' and trashed=false",
      fields:"files(id)",pageSize:1
    }).then(function(r){
      var files=r.result.files||[];
      if(files.length>0){
        gapi.client.request({
          path:"https://www.googleapis.com/upload/drive/v3/files/"+files[0].id,
          method:"PATCH",params:{uploadType:"media"},
          headers:{"Content-Type":mimeType,"Content-Transfer-Encoding":"base64"},
          body:b64
        }).then(function(){notify("✅ Google 雲端 Excel 已更新！");},
        function(e){notify("❌ 更新失敗："+e.result.error.message);});
      } else {
        var delimiter=CRLF+"--"+boundary+CRLF;
        var closeDelim=CRLF+"--"+boundary+"--";
        var meta={name:filename,mimeType:mimeType};
        var body=delimiter+"Content-Type: application/json"+CRLF+CRLF+JSON.stringify(meta)+
          delimiter+"Content-Type: "+mimeType+CRLF+"Content-Transfer-Encoding: base64"+CRLF+CRLF+b64+closeDelim;
        gapi.client.request({
          path:"https://www.googleapis.com/upload/drive/v3/files",
          method:"POST",params:{uploadType:"multipart"},
          headers:{"Content-Type":"multipart/related; boundary="+boundary},
          body:body
        }).then(function(){notify("✅ Google 雲端 Excel 已建立！");},
        function(e){notify("❌ 上傳失敗："+e.result.error.message);});
      }
    },function(){notify("❌ 無法連線 Google Drive");});
  });
}

  sheet2["!cols"]=[{wch:12},{wch:6},{wch:14},{wch:6}];
  XLSX.utils.book_append_sheet(wb,sheet2,"其他運動");
  var ws3=[["Nicole的運動日誌 - 身體數據"],[],
    ["日期","星期","體重(kg)","體脂(%)","骨骼肌(%)","腰圍(cm)","臀圍(cm)","身高(cm)","BMI","腰臀比","心情","備註"]];
  S.bodyData.forEach(function(d){
    var dow="週"+dayNames[new Date(d.date).getDay()];
    var bmi=d.weight&&d.height?+(d.weight/((d.height/100)*(d.height/100))).toFixed(1):"";
    var whr=d.waist&&d.hip?+(d.waist/d.hip).toFixed(2):"";
    ws3.push([d.date,dow,d.weight||"",d.fat||"",d.muscle||"",d.waist||"",d.hip||"",d.height||"",bmi,whr,moodMap[d.mood]||d.mood||"",d.note||""]);
  });
  var sheet3=XLSX.utils.aoa_to_sheet(ws3);
  sheet3["!cols"]=[{wch:12},{wch:6},{wch:9},{wch:8},{wch:10},{wch:9},{wch:9},{wch:9},{wch:7},{wch:8},{wch:8},{wch:20}];
  XLSX.utils.book_append_sheet(wb,sheet3,"身體數據");
  var partNames4={neck:"肩頸",back:"背部",arm:"手臂",hip:"臀部",thigh:"大腿",calf:"小腿",full:"全身"};
  var ws4=[["Nicole的運動日誌 - 按摩修復"],[],["日期","星期","使用工具","時間(分)","按摩部位","緊繃程度(1-5)","備註"]];
  S.massageLogs.forEach(function(l){
    var dow="週"+dayNames[new Date(l.date).getDay()];
    var tools=l.tools.map(function(id){var t=MASSAGE.filter(function(x){return x.id===id;})[0];return t?t.emoji+" "+t.label:id;}).join("、");
    var parts=(l.bodyParts||[]).map(function(p){return partNames4[p]||p;}).join("、");
    ws4.push([l.date,dow,tools,l.duration||"",parts,l.tension||"",l.note||""]);
  });
  var sheet4=XLSX.utils.aoa_to_sheet(ws4);
  sheet4["!cols"]=[{wch:12},{wch:6},{wch:30},{wch:8},{wch:20},{wch:12},{wch:30}];
  XLSX.utils.book_append_sheet(wb,sheet4,"按摩修復");
  return wb;
}

function doCSV(type,allActs){
  var rows=[],filename="";
  var dayNames=["日","一","二","三","四","五","六"];
  var moodMap={"😄":"很好","🙂":"不錯","😐":"普通","😔":"有點累","😫":"很疲憊"};
  if(type==="sessions"){
    filename="重訓記錄.csv";
    rows.push(["日期","星期","訓練類型","動作名稱","組數","重量(kg)","次數","RPE","時間(分)","距離(km)","配速","備註"]);
    S.sessions.forEach(function(s){
      var ti=getTypeInfo()[s.type||"self"]||{label:"自主訓練"};
      var dow="週"+dayNames[new Date(s.date).getDay()];
      (s.rows||[]).filter(function(r){return r.exercise;}).forEach(function(r,ri){
        var g=getGroup(r.exercise,S.groups);
        var tb=isTimeBased(r.exercise,g);
        if(tb){var s0=(r.sets&&r.sets[0])||{};rows.push([s.date,dow,ti.label,r.exercise,1,"","",s0.rpe||"",s0.duration||"",s0.distance||"",s0.pace||"",ri===0?s.note||"":""]);
        }else{(r.sets||[]).forEach(function(st,si){rows.push([s.date,dow,ti.label,r.exercise,si+1,st.weight||"",st.reps||"",st.rpe||"","","","",ri===0&&si===0?s.note||"":""]);});}
      });
    });
  }else if(type==="other"){
    filename="運動記錄.csv";rows.push(["日期","星期","運動項目","次數","備註"]);
    S.otherLogs.forEach(function(l){var dow="週"+dayNames[new Date(l.date).getDay()];l.activities.forEach(function(item,ii){var id=typeof item==="object"?item.id:item;var cnt=typeof item==="object"?item.count:1;var a=getActInfo(id);rows.push([l.date,dow,a.label,cnt,ii===0?(l.note||""):""]);});});
  }else if(type==="body"){
    filename="身體數據.csv";rows.push(["日期","星期","體重(kg)","體脂(%)","骨骼肌(%)","腰圍(cm)","臀圍(cm)","身高(cm)","BMI","腰臀比","心情","備註"]);
    S.bodyData.forEach(function(d){var dow="週"+dayNames[new Date(d.date).getDay()];var bmi=d.weight&&d.height?+(d.weight/((d.height/100)*(d.height/100))).toFixed(1):"";var whr=d.waist&&d.hip?+(d.waist/d.hip).toFixed(2):"";rows.push([d.date,dow,d.weight||"",d.fat||"",d.muscle||"",d.waist||"",d.hip||"",d.height||"",bmi,whr,moodMap[d.mood]||d.mood||"",d.note||""]);});
  }else if(type==="massage"){
    filename="按摩修復記錄.csv";rows.push(["日期","星期","使用工具","時間(分)","按摩部位","緊繃程度","備註"]);
    var _pn={neck:"肩頸",back:"背部",arm:"手臂",hip:"臀部",thigh:"大腿",calf:"小腿",full:"全身"};
    S.massageLogs.forEach(function(l){var dow="週"+dayNames[new Date(l.date).getDay()];var tools=l.tools.map(function(id){var t=MASSAGE.filter(function(x){return x.id===id;})[0];return t?t.emoji+" "+t.label:id;}).join("、");var parts=(l.bodyParts||[]).map(function(p){return _pn[p]||p;}).join("、");rows.push([l.date,dow,tools,l.duration||"",parts,l.tension||"",l.note||""]);});
  }
  if(rows.length)dlFile(makeCSV(rows),filename,"text/csv;charset=utf-8;");
}

// ── 啟動 ──────────────────────────────────────────
// 啟動清理：去重 + 修正舊格式 activities
(function(){
  // 1. 修正舊格式（字串→物件）並確保 count 是數字
  S.otherLogs=S.otherLogs.map(function(l){
    return {
      date:l.date,
      note:l.note||"",
      activities:(l.activities||[]).map(function(a){
        if(typeof a==="string")return{id:a,count:1};
        return{id:a.id,count:+(a.count)||1};
      })
    };
  });
  // 2. 去重（同日保留最後一筆）
  var _dm={};
  S.otherLogs.forEach(function(l){_dm[l.date]=l;});
  S.otherLogs=Object.keys(_dm).sort().map(function(d){return _dm[d];});
  lsSet("other_logs",S.otherLogs);
})();
// 3. 自訂運動項目顏色校正：由於目前介面沒有讓使用者自行挑色的功能，
//    每個自訂項目的顏色永遠是由 getCustomActColor(索引) 依色盤自動指定；
//    因此每次啟動都依「目前在 S.customActs 陣列中的索引」重新對齊一次色盤，
//    確保色盤如果之後又調整內容(例如再次發現撞色而換色)，既有的自訂項目也會自動套用新色盤，
//    不用再另外寫一次性遷移判斷式
(function(){
  var _changed=false;
  S.customActs=S.customActs.map(function(a,idx){
    var _clr=getCustomActColor(idx);
    if(a.color!==_clr.color||a.bg!==_clr.bg||a.border!==_clr.border)_changed=true;
    return Object.assign({},a,{color:_clr.color,bg:_clr.bg,border:_clr.border});
  });
  if(_changed)lsSet("custom_acts",S.customActs);
})();
if(!S.chartEx){var allEx=DEF_GROUPS.reduce(function(a,g){return a.concat(g.exercises);},[]);S.chartEx=allEx[0]||"";}
render();
